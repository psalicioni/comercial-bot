<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bot Comercial</title>
<style>
  /* ============================================================
     PALETA Y TIPOGRAFÍA
     ============================================================ */
  :root {
    --bg: #F8FAFC;
    --surface: #FFFFFF;
    --border: #E2E8F0;
    --text: #0F172A;
    --text-muted: #64748B;
    --accent: #0F766E;
    --accent-hover: #115E59;
    --user-bubble: #0F172A;
    --user-bubble-text: #F8FAFC;
    --bot-bubble: #F1F5F9;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
    --radius: 12px;
    --max-width: 760px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  /* ============================================================
     ESTRUCTURA
     ============================================================ */
  body { display: flex; flex-direction: column; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    flex-shrink: 0;
  }

  .header-inner {
    max-width: var(--max-width);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .brand-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
  }

  .header-meta {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px 16px;
  }

  .chat-stream {
    max-width: var(--max-width);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ============================================================
     MENSAJES
     ============================================================ */
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 88%;
  }
  .msg-user { align-self: flex-end; align-items: flex-end; }
  .msg-bot  { align-self: flex-start; }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .msg-user .bubble {
    background: var(--user-bubble);
    color: var(--user-bubble-text);
    border-bottom-right-radius: 4px;
  }
  .msg-bot .bubble {
    background: var(--bot-bubble);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  /* Markdown básico dentro de las burbujas */
  .bubble p { margin: 0; }
  .bubble p + p { margin-top: 8px; }
  .bubble code {
    background: rgba(15, 23, 42, 0.08);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.92em;
  }
  .bubble ul, .bubble ol { margin: 6px 0 6px 20px; }
  .bubble strong { font-weight: 600; }
  .bubble table {
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 0.92em;
  }
  .bubble th, .bubble td {
    border: 1px solid var(--border);
    padding: 4px 8px;
    text-align: left;
  }
  .bubble th { background: rgba(15, 23, 42, 0.04); font-weight: 600; }

  /* Indicador de "escribiendo" */
  .typing {
    display: inline-flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing span {
    width: 6px;
    height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* ============================================================
     ESTADO INICIAL (welcome)
     ============================================================ */
  .welcome {
    text-align: center;
    padding: 48px 16px 24px;
    max-width: 520px;
    margin: 0 auto;
  }
  .welcome h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .welcome p {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 20px;
  }
  .suggestions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .suggestion {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    transition: all 0.15s;
    font-family: inherit;
  }
  .suggestion:hover {
    border-color: var(--accent);
    background: rgba(15, 118, 110, 0.04);
  }

  /* ============================================================
     COMPOSER
     ============================================================ */
  footer {
    background: var(--bg);
    padding: 12px 16px 20px;
    flex-shrink: 0;
  }

  .composer {
    max-width: var(--max-width);
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    display: flex;
    align-items: flex-end;
    padding: 8px 8px 8px 14px;
    transition: border-color 0.15s;
  }
  .composer:focus-within {
    border-color: var(--accent);
  }

  #input {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.5;
    padding: 8px 0;
    max-height: 140px;
    background: transparent;
    color: var(--text);
  }
  #input::placeholder { color: var(--text-muted); }

  #send {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #send:hover:not(:disabled) { background: var(--accent-hover); }
  #send:disabled {
    background: var(--border);
    cursor: not-allowed;
  }
  #send svg { width: 18px; height: 18px; }

  .footnote {
    max-width: var(--max-width);
    margin: 8px auto 0;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
  }

  /* ============================================================
     ERROR
     ============================================================ */
  .error {
    background: #FEF2F2;
    border: 1px solid #FECACA;
    color: #991B1B;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
  }

  /* Mobile */
  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    main { padding: 16px 12px 12px; }
    footer { padding: 8px 12px 16px; }
    .welcome { padding: 32px 8px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <span class="brand-dot"></span>
      <span>Bot Comercial</span>
    </div>
    <span class="header-meta">Consultas internas</span>
  </div>
</header>

<main id="main">
  <div class="chat-stream" id="stream">
    <div class="welcome" id="welcome">
      <h1>¿Qué necesitás saber?</h1>
      <p>Preguntá sobre ventas, clientes, productos o cualquier dato de los reportes cargados.</p>
      <div class="suggestions">
        <button class="suggestion" data-q="¿Cuál fue el cliente con más facturación el último mes?">¿Cuál fue el cliente con más facturación el último mes?</button>
        <button class="suggestion" data-q="¿Qué producto se vendió más en cantidad?">¿Qué producto se vendió más en cantidad?</button>
        <button class="suggestion" data-q="Mostrame las ventas por vendedor">Mostrame las ventas por vendedor</button>
      </div>
    </div>
  </div>
</main>

<footer>
  <form class="composer" id="composer" autocomplete="off">
    <textarea
      id="input"
      placeholder="Escribí tu pregunta..."
      rows="1"
      aria-label="Pregunta"></textarea>
    <button type="submit" id="send" aria-label="Enviar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </form>
  <div class="footnote">Las respuestas se basan en los reportes cargados. Verificá los datos críticos.</div>
</footer>

<script>
  // ============================================================
  // CONFIGURACIÓN — Editá esta línea con la URL de tu deploy en Vercel
  // ============================================================
  const API_URL = 'https://TU-PROYECTO.vercel.app/api/chat';

  // ============================================================
  // ESTADO
  // ============================================================
  const messages = []; // historial de la conversación

  const $stream = document.getElementById('stream');
  const $welcome = document.getElementById('welcome');
  const $input = document.getElementById('input');
  const $send = document.getElementById('send');
  const $composer = document.getElementById('composer');
  const $main = document.getElementById('main');

  // ============================================================
  // UI HELPERS
  // ============================================================
  function scrollToBottom() {
    $main.scrollTop = $main.scrollHeight;
  }

  // Renderer markdown muy básico: negritas, código inline, listas, párrafos.
  // No es completo, pero alcanza para respuestas de Gemini bien formateadas.
  function renderMarkdown(text) {
    // Escapo HTML primero
    let html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    // Tablas markdown muy básicas
    html = html.replace(/(?:^\|.+\|\n)+/gm, function(block) {
      const lines = block.trim().split('\n');
      if (lines.length < 2) return block;
      const isSeparator = /^\|[\s\-:|]+\|$/.test(lines[1]);
      if (!isSeparator) return block;
      const header = lines[0].split('|').slice(1, -1).map(c => `<th>${c.trim()}</th>`).join('');
      const rows = lines.slice(2).map(l => {
        const cells = l.split('|').slice(1, -1).map(c => `<td>${c.trim()}</td>`).join('');
        return `<tr>${cells}</tr>`;
      }).join('');
      return `<table><thead><tr>${header}</tr></thead><tbody>${rows}</tbody></table>`;
    });
    // Negrita
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Código inline
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Listas con - o *
    html = html.replace(/^(?:[-*] .+\n?)+/gm, function(block) {
      const items = block.trim().split('\n').map(l => `<li>${l.replace(/^[-*] /, '')}</li>`).join('');
      return `<ul>${items}</ul>`;
    });
    // Párrafos: separar por doble salto, envolver lo demás
    const parts = html.split(/\n\n+/);
    return parts.map(p => {
      if (/^<(ul|ol|table)/.test(p)) return p;
      return `<p>${p.replace(/\n/g, '<br>')}</p>`;
    }).join('');
  }

  function addMessage(role, content, opts = {}) {
    if ($welcome) { $welcome.remove(); }
    const $msg = document.createElement('div');
    $msg.className = `msg msg-${role}`;
    const $bubble = document.createElement('div');
    $bubble.className = 'bubble';
    if (opts.html) {
      $bubble.innerHTML = content;
    } else if (role === 'bot') {
      $bubble.innerHTML = renderMarkdown(content);
    } else {
      $bubble.textContent = content;
    }
    $msg.appendChild($bubble);
    $stream.appendChild($msg);
    scrollToBottom();
    return $msg;
  }

  function addTyping() {
    return addMessage('bot', '<span class="typing"><span></span><span></span><span></span></span>', { html: true });
  }

  function addError(text) {
    if ($welcome) { $welcome.remove(); }
    const $msg = document.createElement('div');
    $msg.className = 'msg msg-bot';
    const $err = document.createElement('div');
    $err.className = 'error';
    $err.textContent = text;
    $msg.appendChild($err);
    $stream.appendChild($msg);
    scrollToBottom();
  }

  // ============================================================
  // AUTO-RESIZE DEL TEXTAREA
  // ============================================================
  $input.addEventListener('input', () => {
    $input.style.height = 'auto';
    $input.style.height = Math.min($input.scrollHeight, 140) + 'px';
  });

  // ============================================================
  // ENVÍO
  // ============================================================
  async function send(text) {
    if (!text.trim()) return;

    addMessage('user', text);
    messages.push({ role: 'user', content: text });

    $input.value = '';
    $input.style.height = 'auto';
    $send.disabled = true;

    const $typing = addTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });

      $typing.remove();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        addError(`Error ${res.status}: ${err.error || 'No se pudo obtener respuesta'}`);
        return;
      }

      const data = await res.json();
      addMessage('bot', data.reply);
      messages.push({ role: 'assistant', content: data.reply });
    } catch (err) {
      $typing.remove();
      addError(`Error de conexión: ${err.message}`);
    } finally {
      $send.disabled = false;
      $input.focus();
    }
  }

  $composer.addEventListener('submit', (e) => {
    e.preventDefault();
    send($input.value);
  });

  // Enter para enviar, Shift+Enter para salto de línea
  $input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send($input.value);
    }
  });

  // Click en sugerencias del welcome
  document.querySelectorAll('.suggestion').forEach(btn => {
    btn.addEventListener('click', () => send(btn.dataset.q));
  });

  $input.focus();
</script>

</body>
</html>
