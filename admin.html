<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bot Comercial — Administración</title>
<style>
  :root {
    --bg: #F8FAFC;
    --surface: #FFFFFF;
    --border: #E2E8F0;
    --text: #0F172A;
    --text-muted: #64748B;
    --accent: #0F766E;
    --accent-hover: #115E59;
    --danger: #B91C1C;
    --success: #15803D;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
  }
  .header-inner {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .brand-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
  }
  .header-meta {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 16px;
  }

  /* ============================================================
     LOGIN
     ============================================================ */
  .login {
    max-width: 360px;
    margin: 80px auto 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    box-shadow: var(--shadow-md);
  }
  .login h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .login p {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }
  .input-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }
  label {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }
  input[type="password"] {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus {
    border-color: var(--accent);
  }

  /* ============================================================
     PANEL
     ============================================================ */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 16px;
  }
  .section h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .section-meta {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  .status-empty {
    color: var(--text-muted);
    font-size: 14px;
    padding: 12px 0;
  }
  .status-loaded {
    font-size: 13px;
  }
  .status-loaded .file {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .status-loaded .file:last-child { border-bottom: none; }
  .status-loaded .filename {
    font-weight: 500;
    margin-bottom: 4px;
    word-break: break-all;
  }
  .status-loaded .sheets {
    color: var(--text-muted);
    font-size: 12px;
  }

  /* ============================================================
     DROPZONE
     ============================================================ */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg);
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: var(--accent);
    background: rgba(15, 118, 110, 0.04);
  }
  .dropzone-icon {
    font-size: 32px;
    margin-bottom: 12px;
    color: var(--text-muted);
  }
  .dropzone-primary {
    font-weight: 500;
    margin-bottom: 4px;
  }
  .dropzone-secondary {
    font-size: 13px;
    color: var(--text-muted);
  }
  #file-input { display: none; }

  .file-list {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
  }
  .file-item .remove {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
  }
  .file-item .remove:hover { color: var(--danger); }

  /* ============================================================
     BOTONES
     ============================================================ */
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover:not(:disabled) { background: var(--accent-hover); }
  .btn:disabled {
    background: var(--border);
    color: var(--text-muted);
    cursor: not-allowed;
  }
  .btn-block { width: 100%; }

  .actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 16px;
  }

  /* ============================================================
     FEEDBACK
     ============================================================ */
  .alert {
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
  }
  .alert-error {
    background: #FEF2F2;
    border: 1px solid #FECACA;
    color: #991B1B;
  }
  .alert-success {
    background: #F0FDF4;
    border: 1px solid #BBF7D0;
    color: #166534;
  }

  .hidden { display: none !important; }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    main { padding: 20px 12px; }
    .section { padding: 18px; }
    .login { margin-top: 40px; padding: 24px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <span class="brand-dot"></span>
      <span>Bot Comercial — Administración</span>
    </div>
    <span class="header-meta">Carga de reportes</span>
  </div>
</header>

<main>
  <!-- LOGIN -->
  <div class="login" id="login-view">
    <h1>Acceso</h1>
    <p>Ingresá la contraseña para administrar los reportes del bot.</p>
    <div id="login-error" class="alert alert-error hidden"></div>
    <form id="login-form">
      <div class="input-wrap">
        <label for="password">Contraseña</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-block">Entrar</button>
    </form>
  </div>

  <!-- PANEL -->
  <div id="panel-view" class="hidden">

    <!-- Estado actual -->
    <div class="section">
      <h2>Reportes cargados actualmente</h2>
      <div id="status-content">
        <div class="status-empty">Cargando estado...</div>
      </div>
    </div>

    <!-- Subir nuevos -->
    <div class="section">
      <h2>Cargar nuevos reportes</h2>
      <div id="upload-feedback"></div>

      <div class="dropzone" id="dropzone">
        <div class="dropzone-icon">↑</div>
        <div class="dropzone-primary">Arrastrá los Excel acá</div>
        <div class="dropzone-secondary">o hacé click para seleccionar (.xlsx, .xls, .csv)</div>
        <input type="file" id="file-input" accept=".xlsx,.xls,.csv" multiple>
      </div>

      <div class="file-list" id="file-list"></div>

      <div class="actions">
        <button class="btn" id="upload-btn" disabled>Subir y reemplazar reportes</button>
      </div>
    </div>

  </div>
</main>

<script>
  // ============================================================
  // CONFIGURACIÓN — La URL base se infiere del dominio donde corre la página.
  // Si estás abriendo admin.html desde SharePoint, editá API_BASE manualmente.
  // ============================================================
  const API_BASE = window.location.origin.includes('vercel.app') || window.location.origin.includes('localhost')
    ? window.location.origin
    : 'https://TU-PROYECTO.vercel.app';

  let adminPassword = sessionStorage.getItem('bot-admin-pw') || null;
  let selectedFiles = [];

  // ============================================================
  // ELEMENTS
  // ============================================================
  const $loginView = document.getElementById('login-view');
  const $panelView = document.getElementById('panel-view');
  const $loginForm = document.getElementById('login-form');
  const $passwordInput = document.getElementById('password');
  const $loginError = document.getElementById('login-error');
  const $statusContent = document.getElementById('status-content');
  const $dropzone = document.getElementById('dropzone');
  const $fileInput = document.getElementById('file-input');
  const $fileList = document.getElementById('file-list');
  const $uploadBtn = document.getElementById('upload-btn');
  const $uploadFeedback = document.getElementById('upload-feedback');

  // ============================================================
  // LOGIN
  // ============================================================
  $loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = $passwordInput.value;
    $loginError.classList.add('hidden');
    try {
      const res = await fetch(`${API_BASE}/api/admin/status`, {
        headers: { 'X-Admin-Password': pw }
      });
      if (res.status === 401) {
        $loginError.textContent = 'Contraseña incorrecta.';
        $loginError.classList.remove('hidden');
        return;
      }
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.error || `HTTP ${res.status}`);
      }
      adminPassword = pw;
      sessionStorage.setItem('bot-admin-pw', pw);
      showPanel();
      renderStatus(await res.json());
    } catch (err) {
      $loginError.textContent = `Error: ${err.message}`;
      $loginError.classList.remove('hidden');
    }
  });

  function showPanel() {
    $loginView.classList.add('hidden');
    $panelView.classList.remove('hidden');
  }

  // ============================================================
  // STATUS
  // ============================================================
  async function loadStatus() {
    try {
      const res = await fetch(`${API_BASE}/api/admin/status`, {
        headers: { 'X-Admin-Password': adminPassword }
      });
      if (res.status === 401) {
        sessionStorage.removeItem('bot-admin-pw');
        location.reload();
        return;
      }
      const data = await res.json();
      renderStatus(data);
    } catch (err) {
      $statusContent.innerHTML = `<div class="alert alert-error">Error: ${err.message}</div>`;
    }
  }

  function renderStatus(data) {
    if (!data.loaded) {
      $statusContent.innerHTML = '<div class="status-empty">No hay reportes cargados todavía. Subí los primeros abajo.</div>';
      return;
    }
    const fechaUpdate = new Date(data.updatedAt).toLocaleString('es-AR', {
      day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
    });
    const sizeKb = (data.size / 1024).toFixed(1);
    const filesHtml = data.sources.map(s => `
      <div class="file">
        <div class="filename">${escapeHtml(s.filename)}</div>
        <div class="sheets">${s.sheets.map(sh => `${escapeHtml(sh.name)} (${sh.rows} filas)`).join(' · ')}</div>
      </div>
    `).join('');
    $statusContent.innerHTML = `
      <div class="section-meta">Última actualización: ${fechaUpdate} · ${sizeKb} KB</div>
      <div class="status-loaded">${filesHtml}</div>
    `;
  }

  // ============================================================
  // DROPZONE
  // ============================================================
  $dropzone.addEventListener('click', () => $fileInput.click());

  $dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
    $dropzone.classList.add('dragover');
  });
  $dropzone.addEventListener('dragleave', () => $dropzone.classList.remove('dragover'));
  $dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    $dropzone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });
  $fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

  function handleFiles(fileList) {
    const valid = Array.from(fileList).filter(f => /\.(xlsx|xls|csv)$/i.test(f.name));
    selectedFiles = [...selectedFiles, ...valid];
    renderFileList();
  }

  function renderFileList() {
    if (selectedFiles.length === 0) {
      $fileList.innerHTML = '';
      $uploadBtn.disabled = true;
      return;
    }
    $fileList.innerHTML = selectedFiles.map((f, i) => `
      <div class="file-item">
        <span>${escapeHtml(f.name)} · ${(f.size / 1024).toFixed(1)} KB</span>
        <button class="remove" data-i="${i}" title="Quitar">×</button>
      </div>
    `).join('');
    $uploadBtn.disabled = false;
    $fileList.querySelectorAll('.remove').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedFiles.splice(parseInt(btn.dataset.i), 1);
        renderFileList();
      });
    });
  }

  // ============================================================
  // UPLOAD
  // ============================================================
  $uploadBtn.addEventListener('click', async () => {
    if (selectedFiles.length === 0) return;
    $uploadBtn.disabled = true;
    $uploadBtn.innerHTML = '<span class="spinner"></span>Subiendo...';
    $uploadFeedback.innerHTML = '';

    const formData = new FormData();
    selectedFiles.forEach(f => formData.append('files', f, f.name));

    try {
      const res = await fetch(`${API_BASE}/api/admin/upload`, {
        method: 'POST',
        headers: { 'X-Admin-Password': adminPassword },
        body: formData
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

      const totalRows = data.summary.reduce((sum, s) => sum + s.sheets.reduce((a, sh) => a + sh.rows, 0), 0);
      $uploadFeedback.innerHTML = `
        <div class="alert alert-success">
          ✓ Subida correcta. ${data.summary.length} archivo(s), ${totalRows} filas en total. El bot ya está usando los datos nuevos.
        </div>
      `;
      selectedFiles = [];
      renderFileList();
      loadStatus();
    } catch (err) {
      $uploadFeedback.innerHTML = `<div class="alert alert-error">Error: ${escapeHtml(err.message)}</div>`;
    } finally {
      $uploadBtn.disabled = false;
      $uploadBtn.textContent = 'Subir y reemplazar reportes';
    }
  });

  // ============================================================
  // UTILS
  // ============================================================
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // ============================================================
  // INIT
  // ============================================================
  if (adminPassword) {
    showPanel();
    loadStatus();
  } else {
    $passwordInput.focus();
  }
</script>

</body>
</html>
